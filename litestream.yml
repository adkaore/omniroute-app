dbs:
  - path: /app/.omniroute/storage.sqlite
    replicas:
      - type: s3
        bucket: ${LITESTREAM_B2_BUCKET}
        path: omniroute-db
        endpoint: ${LITESTREAM_B2_ENDPOINT}
        force-path-style: true
        access-key-id: ${LITESTREAM_B2_KEY_ID}
        secret-access-key: ${LITESTREAM_B2_APP_KEY}
        # Sync every 60 seconds (balance between safety and B2 operations)
        sync-interval: 60s
        # Snapshot every 30 minutes (more frequent for faster restore)
        snapshot-interval: 30m
        # Retain snapshots for 7 days
        retention: 72h
        # Validate checksums every 6 hours
        validation-interval: 6h
